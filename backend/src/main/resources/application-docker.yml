# ═══════════════════════════════════════════════════════
#  CareerNest — Docker Profile Configuration
# ═══════════════════════════════════════════════════════

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  upload:
    dir: /app/uploads

logging:
  level:
    com.careernest: INFO
